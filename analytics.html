<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Al-Hasan & Al-Hussein Library — Analytics</title>
  <script>(function(){try{var s=localStorage.getItem('library_settings');if(s){var t=JSON.parse(s).theme;if(t==='dark')document.documentElement.classList.add('dark');}}catch(e){}})();</script>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/transitions.css">
</head>
<body>
  <div class="app-container">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">📚</div>
        <span class="sidebar-title" data-i18n="appName"></span>
      </div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-item">
          <span class="nav-icon">🏠</span>
          <span class="nav-label" data-i18n="dashboard"></span>
        </a>
        <a href="inventory.html" class="nav-item">
          <span class="nav-icon">📖</span>
          <span class="nav-label" data-i18n="inventory"></span>
        </a>
        <a href="cashier.html" class="nav-item">
          <span class="nav-icon">💰</span>
          <span class="nav-label" data-i18n="cashier"></span>
        </a>
        <a href="analytics.html" class="nav-item active">
          <span class="nav-icon">📊</span>
          <span class="nav-label" data-i18n="analytics"></span>
        </a>
        <a href="employees.html" class="nav-item admin-only">
          <span class="nav-icon">👥</span>
          <span class="nav-label" data-i18n="employees"></span>
        </a>
        <a href="trash.html" class="nav-item">
          <span class="nav-icon">🗑️</span>
          <span class="nav-label" data-i18n="trash"></span>
        </a>
        <a href="settings.html" class="nav-item">
          <span class="nav-icon">⚙️</span>
          <span class="nav-label" data-i18n="settings"></span>
        </a>
      </nav>
      <div class="sidebar-footer">
        <button class="btn btn-secondary btn-block" id="logoutBtn">
          <span data-i18n="logout"></span>
        </button>
      </div>
    </aside>

    <main class="main-content">
      <header class="topbar">
        <div class="topbar-left">
          <h2 class="topbar-title" data-i18n="analytics"></h2>
        </div>
        <div class="topbar-right">
          <button class="toggle-btn" id="themeToggle" title="Toggle theme">🌙</button>
          <button class="toggle-btn" id="langToggle" title="Toggle language">EN</button>
          <div class="user-badge">
            <div class="user-avatar" id="userAvatar"></div>
            <div class="user-info">
              <span class="user-name" id="userName"></span>
              <span class="user-role" id="userRole"></span>
            </div>
          </div>
        </div>
      </header>

      <div class="page-content">
        <div class="time-filters">
          <button class="time-filter-btn active" data-filter="today">Today</button>
          <button class="time-filter-btn" data-filter="yesterday">Yesterday</button>
          <button class="time-filter-btn" data-filter="last7days">Last 7 Days</button>
          <button class="time-filter-btn" data-filter="thisWeek">This Week</button>
          <button class="time-filter-btn" data-filter="lastWeek">Last Week</button>
          <button class="time-filter-btn" data-filter="thisMonth">This Month</button>
          <button class="time-filter-btn" data-filter="lastMonth">Last Month</button>
          <button class="time-filter-btn" data-filter="last30days">Last 30 Days</button>
          <button class="time-filter-btn" data-filter="custom">Custom Range</button>
          <button class="time-filter-btn" data-filter="all">All Time</button>
        </div>

        <div class="custom-date-range" id="customDateRange">
          <input type="date" id="customStartDate" class="form-input">
          <span>to</span>
          <input type="date" id="customEndDate" class="form-input">
          <button class="btn btn-primary" id="applyCustomRange">Apply</button>
        </div>

        <div class="grid grid-4" id="statCards">
          <div class="stat-card animate-slide-up stagger-1">
            <div class="stat-card-label">Total Sales</div>
            <div class="stat-card-value" id="totalSales">0.00</div>
          </div>
          <div class="stat-card animate-slide-up stagger-2">
            <div class="stat-card-label">Total Profit</div>
            <div class="stat-card-value" id="totalProfit" style="color:var(--success);">0.00</div>
          </div>
          <div class="stat-card animate-slide-up stagger-3">
            <div class="stat-card-label">Total Orders</div>
            <div class="stat-card-value" id="totalOrders">0</div>
          </div>
          <div class="stat-card animate-slide-up stagger-4">
            <div class="stat-card-label">Products Sold</div>
            <div class="stat-card-value" id="totalProductsSold">0</div>
          </div>
        </div>

        <div class="card" style="margin-top:2rem;">
          <div class="card-header">
            <h3 class="card-title">Sales Chart</h3>
          </div>
          <div class="card-body">
            <canvas id="salesChart" height="100"></canvas>
          </div>
        </div>

        <div class="grid grid-2" style="margin-top:2rem;">
          <div class="card">
            <div class="card-header">
              <h3 class="card-title">Best Sellers</h3>
            </div>
            <div class="card-body" id="bestSellers"></div>
          </div>
          <div class="card">
            <div class="card-header">
              <h3 class="card-title">Low Stock Alert</h3>
            </div>
            <div class="card-body" id="lowStock"></div>
          </div>
        </div>

        <div class="card" style="margin-top:2rem;">
          <div class="card-header">
            <h3 class="card-title">Recent Transactions</h3>
          </div>
          <div class="card-body">
            <div id="transactionsList"></div>
            <div class="empty-state" id="emptyState" style="display:none;">
              <div class="empty-state-icon">📊</div>
              <div class="empty-state-text">No transactions for this period</div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="js/core/storage.js"></script>
  <script src="js/utils/helpers.js"></script>
  <script src="js/utils/snapshot.js"></script>
  <script src="js/utils/page-transitions.js"></script>
  <script src="js/core/i18n.js"></script>
  <script src="js/core/theme.js"></script>
  <script src="js/core/auth.js"></script>
  <script src="data/seed.js"></script>
  <script src="js/modules/analytics.js"></script>
  <script>
    if (!Auth.requireAuth()) throw new Error('Not authenticated');
    if (!Auth.isAdmin()) { window.location.href = 'dashboard.html'; throw new Error('Admin only'); }

    Theme.init();
    I18n.init();
    Snapshot.initAutoSnapshot();
    PageTransitions.init();

    const session = Auth.getSession();
    document.getElementById('userName').textContent = session.username;
    document.getElementById('userRole').textContent = session.role;
    document.getElementById('userAvatar').textContent = session.username.charAt(0).toUpperCase();

    const themeBtn = document.getElementById('themeToggle');
    themeBtn.textContent = Theme.getTheme() === 'dark' ? '☀️' : '🌙';
    themeBtn.addEventListener('click', () => {
      SmoothTheme.toggle();
      themeBtn.textContent = Theme.getTheme() === 'dark' ? '☀️' : '🌙';
    });

    const langBtn = document.getElementById('langToggle');
    langBtn.textContent = I18n.getLanguage() === 'en' ? 'عربي' : 'EN';
    langBtn.addEventListener('click', () => {
      I18n.toggle();
      langBtn.textContent = I18n.getLanguage() === 'en' ? 'عربي' : 'EN';
    });

    Analytics.init();
  </script>
</body>
</html>
