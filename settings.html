<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Al-Hasan & Al-Hussein Library — Settings</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/transitions.css">
</head>
<body>
  <div class="app-container">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">📚</div>
        <span class="sidebar-title" data-i18n="appName"></span>
      </div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-item">
          <span class="nav-icon">🏠</span>
          <span class="nav-label" data-i18n="dashboard"></span>
        </a>
        <a href="inventory.html" class="nav-item">
          <span class="nav-icon">📖</span>
          <span class="nav-label" data-i18n="inventory"></span>
        </a>
        <a href="cashier.html" class="nav-item">
          <span class="nav-icon">💰</span>
          <span class="nav-label" data-i18n="cashier"></span>
        </a>
        <a href="analytics.html" class="nav-item admin-only">
          <span class="nav-icon">📊</span>
          <span class="nav-label" data-i18n="analytics"></span>
        </a>
        <a href="employees.html" class="nav-item admin-only">
          <span class="nav-icon">👥</span>
          <span class="nav-label" data-i18n="employees"></span>
        </a>
        <a href="trash.html" class="nav-item">
          <span class="nav-icon">🗑️</span>
          <span class="nav-label" data-i18n="trash"></span>
        </a>
        <a href="settings.html" class="nav-item active">
          <span class="nav-icon">⚙️</span>
          <span class="nav-label" data-i18n="settings"></span>
        </a>
      </nav>
      <div class="sidebar-footer">
        <button class="btn btn-secondary btn-block" id="logoutBtn">
          <span data-i18n="logout"></span>
        </button>
      </div>
    </aside>

    <main class="main-content">
      <header class="topbar">
        <div class="topbar-left">
          <h2 class="topbar-title" data-i18n="settings"></h2>
        </div>
        <div class="topbar-right">
          <button class="toggle-btn" id="themeToggle" title="Toggle theme">🌙</button>
          <button class="toggle-btn" id="langToggle" title="Toggle language">EN</button>
          <div class="user-badge">
            <div class="user-avatar" id="userAvatar"></div>
            <div class="user-info">
              <span class="user-name" id="userName"></span>
              <span class="user-role" id="userRole"></span>
            </div>
          </div>
        </div>
      </header>

      <div class="page-content">
        <div class="settings-section">
          <h3 class="settings-section-title" data-i18n="appearance"></h3>
          <div class="settings-row">
            <div>
              <div class="settings-row-label" data-i18n="darkMode"></div>
              <div class="settings-row-desc">Toggle between light and dark themes</div>
            </div>
            <button class="btn btn-primary" id="themeToggleBtn">Toggle Theme</button>
          </div>
          <div class="settings-row">
            <div>
              <div class="settings-row-label" data-i18n="language"></div>
              <div class="settings-row-desc">Switch between English and Arabic</div>
            </div>
            <button class="btn btn-primary" id="langToggleBtn">Toggle Language</button>
          </div>
        </div>

        <div class="settings-section">
          <h3 class="settings-section-title" data-i18n="backupRestore"></h3>
          <div class="settings-row">
            <div>
              <div class="settings-row-label" data-i18n="exportData"></div>
              <div class="settings-row-desc">Download all data as JSON backup file</div>
            </div>
            <button class="btn btn-success" id="exportBtn">Export Data</button>
          </div>
          <div class="settings-row">
            <div>
              <div class="settings-row-label" data-i18n="importData"></div>
              <div class="settings-row-desc">Restore data from JSON backup file</div>
            </div>
            <div>
              <input type="file" id="importFile" accept=".json" style="display:none;">
              <button class="btn btn-warning" id="importBtn">Import Data</button>
            </div>
          </div>
        </div>

        <div class="settings-section admin-only">
          <h3 class="settings-section-title">Daily Snapshots</h3>
          <div class="settings-row">
            <div>
              <div class="settings-row-label">Automatic daily backups</div>
              <div class="settings-row-desc">System snapshots are created automatically. Restore to any previous day.</div>
            </div>
          </div>
          <div id="snapshotsList" class="snapshots-container"></div>
          <div class="empty-state" id="snapshotsEmpty" style="display:none;">
            <div class="empty-state-icon">📅</div>
            <div class="empty-state-text">No snapshots yet</div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="js/core/storage.js"></script>
  <script src="js/utils/helpers.js"></script>
  <script src="js/utils/backup.js"></script>
  <script src="js/utils/snapshot.js"></script>
  <script src="js/utils/page-transitions.js"></script>
  <script src="js/core/i18n.js"></script>
  <script src="js/core/theme.js"></script>
  <script src="js/core/auth.js"></script>
  <script src="data/seed.js"></script>
  <script>
    if (!Auth.requireAuth()) throw new Error('Not authenticated');

    Theme.init();
    I18n.init();
    Snapshot.initAutoSnapshot();
    PageTransitions.init();

    const session = Auth.getSession();
    document.getElementById('userName').textContent = session.username;
    document.getElementById('userRole').textContent = session.role;
    document.getElementById('userAvatar').textContent = session.username.charAt(0).toUpperCase();

    if (Auth.isWorker()) {
      document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'none');
    }

    const themeBtn = document.getElementById('themeToggle');
    themeBtn.textContent = Theme.getTheme() === 'dark' ? '☀️' : '🌙';
    themeBtn.addEventListener('click', () => {
      SmoothTheme.toggle();
      themeBtn.textContent = Theme.getTheme() === 'dark' ? '☀️' : '🌙';
    });

    const langBtn = document.getElementById('langToggle');
    langBtn.textContent = I18n.getLanguage() === 'en' ? 'عربي' : 'EN';
    langBtn.addEventListener('click', () => {
      I18n.toggle();
      langBtn.textContent = I18n.getLanguage() === 'en' ? 'عربي' : 'EN';
    });

    document.getElementById('themeToggleBtn').addEventListener('click', () => {
      SmoothTheme.toggle();
      themeBtn.textContent = Theme.getTheme() === 'dark' ? '☀️' : '🌙';
    });

    document.getElementById('langToggleBtn').addEventListener('click', () => {
      I18n.toggle();
      langBtn.textContent = I18n.getLanguage() === 'en' ? 'عربي' : 'EN';
    });

    document.getElementById('exportBtn').addEventListener('click', () => {
      Backup.exportData();
    });

    document.getElementById('importBtn').addEventListener('click', () => {
      document.getElementById('importFile').click();
    });

    document.getElementById('importFile').addEventListener('change', (e) => {
      if (e.target.files.length > 0) {
        Backup.importData(e.target.files[0]);
      }
    });

    function renderSnapshots() {
      const snapshots = Storage.getSnapshotHistory();
      const container = document.getElementById('snapshotsList');
      const emptyState = document.getElementById('snapshotsEmpty');

      if (snapshots.length === 0) {
        container.innerHTML = '';
        emptyState.style.display = 'block';
        return;
      }

      emptyState.style.display = 'none';
      container.innerHTML = snapshots.map(s => `
        <div class="snapshot-item">
          <div class="snapshot-info">
            <div class="snapshot-date">${s.date}</div>
            <div class="snapshot-meta">
              <span>📖 ${s.booksCount} books</span>
              <span>💰 ${s.transactionsCount} sales</span>
              <span>👥 ${s.usersCount} users</span>
            </div>
          </div>
          <div class="snapshot-actions">
            <button class="btn btn-sm btn-primary" onclick="Backup.restoreFromSnapshot('${s.date}')">Restore</button>
            <button class="btn btn-sm btn-secondary" onclick="Snapshot.exportSnapshotAsFile('${s.date}')">Export</button>
            ${s.date !== Snapshot.getTodayKey() ? `<button class="btn btn-sm btn-danger" onclick="Snapshot.deleteSnapshot('${s.date}'); window.Settings.renderSnapshots();">Delete</button>` : ''}
          </div>
        </div>
      `).join('');
    }

    window.Settings = { renderSnapshots };
    renderSnapshots();
  </script>
</body>
</html>
