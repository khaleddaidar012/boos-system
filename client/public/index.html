<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ERP System</title>
  <script>
    (function() {
      try {
        var t = localStorage.getItem("erp_theme");
        if (t === "dark" || (!t && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      } catch(e) {}
    })();
  </script>
  <link rel="stylesheet" href="../src/styles/base/variables.css">
  <link rel="stylesheet" href="../src/styles/base/global.css">
  <link rel="stylesheet" href="../src/styles/base/transitions.css">
  <link rel="stylesheet" href="../src/styles/layouts/dashboard.css">
  <link rel="stylesheet" href="../src/styles/layouts/sidebar.css">
  <link rel="stylesheet" href="../src/styles/layouts/navbar.css">
  <link rel="stylesheet" href="../src/styles/components/card.css">
  <link rel="stylesheet" href="../src/styles/components/button.css">
</head>
<body>
  <div class="app">
    <div id="sidebar"></div>
    <div class="app-main" id="appMain">
      <div id="navbar"></div>
      <main class="app-content" id="content"></main>
    </div>
  </div>

  <script type="module" src="../src/app.js"></script>
</body>
</html>
