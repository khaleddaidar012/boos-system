<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Al-Hasan & Al-Hussein Library — Debts Management</title>
  <script>(function(){try{var s=localStorage.getItem('library_settings');if(s){var t=JSON.parse(s).theme;if(t==='dark')document.documentElement.classList.add('dark');}}catch(e){}})();</script>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/transitions.css">
</head>
<body>
  <div class="app-container">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">📚</div>
        <span class="sidebar-title" data-i18n="appName"></span>
      </div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-item">
          <span class="nav-icon">🏠</span>
          <span class="nav-label" data-i18n="dashboard"></span>
        </a>
        <a href="inventory.html" class="nav-item">
          <span class="nav-icon">📖</span>
          <span class="nav-label" data-i18n="inventory"></span>
        </a>
        <a href="cashier.html" class="nav-item">
          <span class="nav-icon">💰</span>
          <span class="nav-label" data-i18n="cashier"></span>
        </a>
        <a href="analytics.html" class="nav-item admin-only">
          <span class="nav-icon">📊</span>
          <span class="nav-label" data-i18n="analytics"></span>
        </a>
        <a href="employees.html" class="nav-item admin-only">
          <span class="nav-icon">👥</span>
          <span class="nav-label" data-i18n="employees"></span>
        </a>
        <a href="debts.html" class="nav-item active admin-only">
          <span class="nav-icon">💳</span>
          <span class="nav-label" data-i18n="debts"></span>
        </a>
        <a href="trash.html" class="nav-item">
          <span class="nav-icon">🗑️</span>
          <span class="nav-label" data-i18n="trash"></span>
        </a>
        <a href="settings.html" class="nav-item">
          <span class="nav-icon">⚙️</span>
          <span class="nav-label" data-i18n="settings"></span>
        </a>
      </nav>
      <div class="sidebar-footer">
        <button class="btn btn-secondary btn-block" id="logoutBtn">
          <span data-i18n="logout"></span>
        </button>
      </div>
    </aside>

    <main class="main-content">
      <header class="topbar">
        <div class="topbar-left">
          <button class="mobile-menu-btn" id="mobileMenuBtn" style="display:none;">☰</button>
          <h2 class="topbar-title" data-i18n="debts"></h2>
        </div>
        <div class="topbar-right">
          <button class="toggle-btn" id="themeToggle" title="Toggle theme">🌙</button>
          <button class="toggle-btn" id="langToggle" title="Toggle language">EN</button>
          <div class="user-badge">
            <div class="user-avatar" id="userAvatar"></div>
            <div class="user-info">
              <span class="user-name" id="userName"></span>
              <span class="user-role" id="userRole"></span>
            </div>
          </div>
        </div>
      </header>

      <div class="page-content">
        <div class="debt-stats" id="debtStats">
          <div class="stat-card">
            <div class="stat-card-value" id="statTotalOwed">0</div>
            <div class="stat-card-label" data-i18n="totalOwedToUs"></div>
          </div>
          <div class="stat-card">
            <div class="stat-card-value" id="statTotalWeOwe">0</div>
            <div class="stat-card-label" data-i18n="totalWeOwe"></div>
          </div>
          <div class="stat-card">
            <div class="stat-card-value" id="statUnpaidCount">0</div>
            <div class="stat-card-label" data-i18n="unpaidDebts"></div>
          </div>
          <div class="stat-card">
            <div class="stat-card-value" id="statOverdueCount">0</div>
            <div class="stat-card-label" data-i18n="overdueDebts"></div>
          </div>
        </div>

        <div class="page-header">
          <div class="page-header-left">
            <div class="search-bar">
              <span class="search-bar-icon">🔍</span>
              <input type="text" id="searchInput" data-i18n="searchDebts">
            </div>
            <div class="debt-filters" id="debtFilters">
              <button class="filter-tab active" data-filter="all" data-i18n="filterAll"></button>
              <button class="filter-tab" data-filter="unpaid" data-i18n="filterUnpaid"></button>
              <button class="filter-tab" data-filter="partial" data-i18n="filterPartial"></button>
              <button class="filter-tab" data-filter="paid" data-i18n="filterPaid"></button>
              <button class="filter-tab" data-filter="overdue" data-i18n="filterOverdue"></button>
            </div>
          </div>
          <div class="page-header-actions">
            <select id="sortSelect" class="form-select form-select-sm">
              <option value="newest" data-i18n="sortNewest"></option>
              <option value="highest" data-i18n="sortHighest"></option>
              <option value="dueDate" data-i18n="sortDueDate"></option>
              <option value="mostActive" data-i18n="sortMostActive"></option>
            </select>
            <button class="btn btn-secondary" id="exportBtn" title="Export Data">📤</button>
            <button class="btn btn-primary" id="addDebtBtn">
              <span>+</span>
              <span data-i18n="addDebt"></span>
            </button>
          </div>
        </div>

        <div class="debt-tabs">
          <button class="debt-tab active" data-type="owed_to_library" data-i18n="debtsOnOthers"></button>
          <button class="debt-tab" data-type="we_owe" data-i18n="debtsOnUs"></button>
        </div>

        <div class="debt-list" id="debtList"></div>
        <div class="empty-state" id="emptyState" style="display:none;">
          <div class="empty-state-icon">💳</div>
          <div class="empty-state-text" data-i18n="noDebts"></div>
        </div>
      </div>
    </main>
  </div>

  <div class="modal-overlay debt-modal-overlay" id="debtModal">
    <div class="modal debt-modal">
      <div class="modal-header modal-header-sticky">
        <h3 class="modal-title" id="modalTitle" data-i18n="addDebt"></h3>
        <button class="modal-close" id="modalClose">&times;</button>
      </div>
      <form id="debtForm">
        <div class="modal-body debt-modal-body">
          <input type="hidden" id="debtId">
          <input type="hidden" id="debtType" value="owed_to_library">

          <div class="form-section">
            <div class="form-section-header">
              <span class="form-section-icon">👤</span>
              <h4 class="form-section-title" data-i18n="sectionPersonInfo"></h4>
            </div>
            <div class="form-section-body">
              <div class="form-row">
                <div class="form-group">
                  <label class="form-label" data-i18n="personName"></label>
                  <input type="text" id="personName" class="form-input" required>
                </div>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label class="form-label" data-i18n="personPhone"></label>
                  <input type="tel" id="personPhone" class="form-input">
                </div>
              </div>
            </div>
          </div>

          <div class="form-section">
            <div class="form-section-header">
              <span class="form-section-icon">💵</span>
              <h4 class="form-section-title" data-i18n="sectionDebtAmount"></h4>
            </div>
            <div class="form-section-body">
              <div class="form-row form-row-2">
                <div class="form-group">
                  <label class="form-label" data-i18n="totalAmount"></label>
                  <input type="number" id="totalAmount" class="form-input" step="0.01" min="0" required>
                </div>
                <div class="form-group">
                  <label class="form-label" data-i18n="paidAmount"></label>
                  <input type="number" id="paidAmount" class="form-input" step="0.01" min="0" value="0">
                </div>
              </div>
              <div class="form-row form-row-2">
                <div class="form-group">
                  <label class="form-label" data-i18n="dueDate"></label>
                  <input type="date" id="dueDate" class="form-input">
                </div>
                <div class="form-group">
                  <label class="form-label" data-i18n="debtStatus"></label>
                  <input type="text" id="debtStatusDisplay" class="form-input" readonly disabled>
                </div>
              </div>
            </div>
          </div>

          <div class="form-section">
            <div class="form-section-header">
              <span class="form-section-icon">📝</span>
              <h4 class="form-section-title" data-i18n="sectionNotes"></h4>
            </div>
            <div class="form-section-body">
              <div class="form-row">
                <div class="form-group">
                  <label class="form-label" data-i18n="notes"></label>
                  <textarea id="debtNotes" class="form-textarea" rows="3"></textarea>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="modal-footer modal-footer-sticky">
          <button type="button" class="btn btn-secondary" id="cancelBtn" data-i18n="cancel"></button>
          <button type="submit" class="btn btn-primary btn-lg" data-i18n="save"></button>
        </div>
      </form>
    </div>
  </div>

  <div class="modal-overlay payment-modal-overlay" id="paymentModal">
    <div class="modal payment-modal">
      <div class="modal-header modal-header-sticky">
        <h3 class="modal-title" id="paymentModalTitle" data-i18n="makePayment"></h3>
        <button class="modal-close" id="paymentModalClose">&times;</button>
      </div>
      <form id="paymentForm">
        <div class="modal-body payment-modal-body">
          <input type="hidden" id="paymentDebtId">
          
          <div class="payment-debt-info" id="paymentDebtInfo"></div>

          <div class="form-section">
            <div class="form-section-body">
              <div class="form-row">
                <div class="form-group">
                  <label class="form-label" data-i18n="paymentAmount"></label>
                  <input type="number" id="paymentAmount" class="form-input" step="0.01" min="0" required>
                </div>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label class="form-label" data-i18n="paymentNote"></label>
                  <input type="text" id="paymentNote" class="form-input">
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="modal-footer modal-footer-sticky">
          <button type="button" class="btn btn-secondary" id="paymentCancelBtn" data-i18n="cancel"></button>
          <button type="submit" class="btn btn-success btn-lg" data-i18n="confirmPayment"></button>
        </div>
      </form>
    </div>
  </div>

  <div class="modal-overlay log-modal-overlay" id="logModal">
    <div class="modal log-modal">
      <div class="modal-header modal-header-sticky">
        <h3 class="modal-title" data-i18n="debtLogs"></h3>
        <button class="modal-close" id="logModalClose">&times;</button>
      </div>
      <div class="modal-body log-modal-body">
        <div id="debtLogsList" class="debt-logs-list"></div>
      </div>
    </div>
  </div>

  <script src="js/core/storage.js"></script>
  <script src="js/utils/helpers.js"></script>
  <script src="js/ui/ui-kit.js"></script>
  <script src="js/utils/snapshot.js"></script>
  <script src="js/utils/backup.js"></script>
  <script src="js/utils/page-transitions.js"></script>
  <script src="js/core/i18n.js"></script>
  <script src="js/core/theme.js"></script>
  <script src="js/core/auth.js"></script>
  <script src="data/seed.js"></script>
  <script src="js/modules/debts.js"></script>
  <script>
    if (!Auth.requireAuth()) throw new Error('Not authenticated');
    if (!Auth.isAdmin()) {
      window.location.href = 'dashboard.html';
      throw new Error('Admin access required');
    }

    Theme.init();
    I18n.init();
    Snapshot.initAutoSnapshot();
    AutoBackup.checkAndRun();
    PageTransitions.init();

    const session = Auth.getSession();
    document.getElementById('userName').textContent = session.username;
    document.getElementById('userRole').textContent = session.role;
    document.getElementById('userAvatar').textContent = session.username.charAt(0).toUpperCase();

    const themeBtn = document.getElementById('themeToggle');
    themeBtn.textContent = Theme.getTheme() === 'dark' ? '☀️' : '🌙';
    themeBtn.addEventListener('click', () => {
      SmoothTheme.toggle();
      themeBtn.textContent = Theme.getTheme() === 'dark' ? '☀️' : '🌙';
    });

    const langBtn = document.getElementById('langToggle');
    langBtn.textContent = I18n.getLanguage() === 'en' ? 'عربي' : 'EN';
    langBtn.addEventListener('click', () => {
      I18n.toggle();
      langBtn.textContent = I18n.getLanguage() === 'en' ? 'عربي' : 'EN';
    });

    document.getElementById('logoutBtn').addEventListener('click', () => {
      Auth.logout();
    });

    Debts.init();
  </script>
</body>
</html>
