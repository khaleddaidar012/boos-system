<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Al-Hasan & Al-Hussein Library — Inventory</title>
  <script>(function(){try{var s=localStorage.getItem('library_settings');if(s){var t=JSON.parse(s).theme;if(t==='dark')document.documentElement.classList.add('dark');}}catch(e){}})();</script>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/transitions.css">
</head>
<body>
  <div class="app-container">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">📚</div>
        <span class="sidebar-title" data-i18n="appName"></span>
      </div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-item">
          <span class="nav-icon">🏠</span>
          <span class="nav-label" data-i18n="dashboard"></span>
        </a>
        <a href="inventory.html" class="nav-item active">
          <span class="nav-icon">📖</span>
          <span class="nav-label" data-i18n="inventory"></span>
        </a>
        <a href="cashier.html" class="nav-item">
          <span class="nav-icon">💰</span>
          <span class="nav-label" data-i18n="cashier"></span>
        </a>
        <a href="analytics.html" class="nav-item admin-only">
          <span class="nav-icon">📊</span>
          <span class="nav-label" data-i18n="analytics"></span>
        </a>
        <a href="employees.html" class="nav-item admin-only">
          <span class="nav-icon">👥</span>
          <span class="nav-label" data-i18n="employees"></span>
        </a>
        <a href="debts.html" class="nav-item admin-only">
          <span class="nav-icon">💳</span>
          <span class="nav-label" data-i18n="debts"></span>
        </a>
        <a href="trash.html" class="nav-item">
          <span class="nav-icon">🗑️</span>
          <span class="nav-label" data-i18n="trash"></span>
        </a>
        <a href="settings.html" class="nav-item">
          <span class="nav-icon">⚙️</span>
          <span class="nav-label" data-i18n="settings"></span>
        </a>
      </nav>
      <div class="sidebar-footer">
        <button class="btn btn-secondary btn-block" id="logoutBtn">
          <span data-i18n="logout"></span>
        </button>
      </div>
    </aside>

    <main class="main-content">
      <header class="topbar">
        <div class="topbar-left">
          <button class="mobile-menu-btn" id="mobileMenuBtn" style="display:none;">☰</button>
          <h2 class="topbar-title" data-i18n="inventory"></h2>
        </div>
        <div class="topbar-right">
          <button class="toggle-btn" id="themeToggle" title="Toggle theme">🌙</button>
          <button class="toggle-btn" id="langToggle" title="Toggle language">EN</button>
          <div class="user-badge">
            <div class="user-avatar" id="userAvatar"></div>
            <div class="user-info">
              <span class="user-name" id="userName"></span>
              <span class="user-role" id="userRole"></span>
            </div>
          </div>
        </div>
      </header>

      <div class="page-content">
        <div class="page-header">
          <div class="page-header-left">
            <div class="search-bar">
              <span class="search-bar-icon">🔍</span>
              <input type="text" id="searchInput" data-i18n="searchProducts">
            </div>
            <div class="filter-tabs" id="filterTabs">
              <button class="filter-tab active" data-type="all" data-i18n="filterAll"></button>
            </div>
          </div>
          <div class="page-header-actions">
            <button class="btn btn-secondary" id="exportBtn" title="Export Data">📤</button>
            <button class="btn btn-primary" id="addProductBtn">
              <span>+</span>
              <span data-i18n="addProduct"></span>
            </button>
          </div>
        </div>

        <div class="inventory-stats" id="inventoryStats">
          <div class="stat-card">
            <div class="stat-card-label" data-i18n="totalProducts"></div>
            <div class="stat-card-value" id="statTotal">0</div>
          </div>
          <div class="stat-card">
            <div class="stat-card-label" data-i18n="totalValue"></div>
            <div class="stat-card-value" id="statValue">0</div>
          </div>
          <div class="stat-card">
            <div class="stat-card-label" data-i18n="lowStockCount"></div>
            <div class="stat-card-value" id="statLowStock">0</div>
          </div>
          <div class="stat-card">
            <div class="stat-card-label" data-i18n="outOfStockCount"></div>
            <div class="stat-card-value" id="statOutOfStock">0</div>
          </div>
        </div>

        <div class="grid grid-3" id="productsGrid"></div>
        <div class="empty-state" id="emptyState" style="display:none;">
          <div class="empty-state-icon">📦</div>
          <div class="empty-state-text" data-i18n="noProducts"></div>
        </div>
      </div>
    </main>
  </div>

  <div class="modal-overlay product-modal-overlay" id="productModal">
    <div class="modal product-modal">
      <div class="modal-header modal-header-sticky">
        <h3 class="modal-title" id="modalTitle" data-i18n="addProduct"></h3>
        <button class="modal-close" id="modalClose">&times;</button>
      </div>
      <form id="productForm">
        <div class="modal-body product-modal-body">
          <input type="hidden" id="productId">

          <div class="form-section quick-add-section">
            <div class="form-section-header">
              <span class="form-section-icon">⚡</span>
              <h4 class="form-section-title" data-i18n="sectionQuickAdd"></h4>
            </div>
            <div class="form-section-body">
              <div class="form-row">
                <div class="form-group">
                  <label class="form-label" data-i18n="productName"></label>
                  <input type="text" id="productName" class="form-input" required>
                </div>
              </div>
              <div class="form-row form-row-2">
                <div class="form-group">
                  <label class="form-label" data-i18n="productType"></label>
                  <select id="productType" class="form-select" required>
                    <option value="" data-i18n="selectType"></option>
                  </select>
                </div>
                <div class="form-group">
                  <label class="form-label" data-i18n="quantity"></label>
                  <input type="number" id="productQuantity" class="form-input" min="0" required>
                </div>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label class="form-label" data-i18n="price"></label>
                  <input type="number" id="productPrice" class="form-input" step="0.01" min="0" required>
                </div>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label class="form-label" data-i18n="description"></label>
                  <textarea id="productDescription" class="form-textarea" rows="2"></textarea>
                </div>
              </div>
            </div>
          </div>

          <button type="button" class="btn btn-advanced-toggle" id="advancedToggleBtn" onclick="Inventory.toggleAdvancedSection()">
            <span data-i18n="showAdvanced"></span>
            <span class="advanced-toggle-arrow" id="advancedToggleArrow">▼</span>
          </button>

          <div class="advanced-section" id="advancedSection">
            <div class="form-section">
              <div class="form-section-header">
                <span class="form-section-icon">💰</span>
                <h4 class="form-section-title" data-i18n="sectionPricing"></h4>
              </div>
              <div class="form-section-body">
                <div class="form-row admin-only-field">
                  <div class="form-group">
                    <label class="form-label" data-i18n="cost"></label>
                    <input type="number" id="productCost" class="form-input" step="0.01" min="0">
                  </div>
                </div>
                <div class="form-row admin-only-field">
                  <div class="form-group">
                    <label class="form-label" data-i18n="profit"></label>
                    <input type="text" id="productProfit" class="form-input" readonly disabled>
                  </div>
                </div>
              </div>
            </div>

            <div class="form-section">
              <div class="form-section-header">
                <span class="form-section-icon">📝</span>
                <h4 class="form-section-title" data-i18n="sectionAttributes"></h4>
              </div>
              <div class="form-section-body">
                <div id="dynamicAttributes" class="dynamic-attributes"></div>
                <div class="form-row">
                  <div class="form-group">
                    <label class="form-label" data-i18n="image"></label>
                    <input type="url" id="productImage" class="form-input">
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="modal-footer modal-footer-sticky">
          <button type="button" class="btn btn-secondary" id="cancelBtn" data-i18n="cancel"></button>
          <button type="submit" class="btn btn-primary btn-lg" data-i18n="save"></button>
        </div>
      </form>
    </div>
  </div>

  <div class="modal-overlay" id="customAttrModal">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title" data-i18n="addCustomAttribute"></h3>
        <button class="modal-close" id="customAttrClose">&times;</button>
      </div>
      <form id="customAttrForm">
        <div class="modal-body">
          <div class="form-group">
            <label class="form-label" data-i18n="attrKey"></label>
            <input type="text" id="customAttrKey" class="form-input" required placeholder="e.g., weight">
          </div>
          <div class="form-group">
            <label class="form-label" data-i18n="attrLabel"></label>
            <input type="text" id="customAttrLabel" class="form-input" required placeholder="e.g., Weight (kg)">
          </div>
          <div class="form-group">
            <label class="form-label" data-i18n="attrType"></label>
            <select id="customAttrType" class="form-select" required>
              <option value="text">Text</option>
              <option value="number">Number</option>
              <option value="select">Select</option>
              <option value="textarea">Textarea</option>
              <option value="boolean">Yes/No</option>
            </select>
          </div>
          <div class="form-group" id="customAttrOptionsGroup" style="display:none;">
            <label class="form-label" data-i18n="attrOptions"></label>
            <textarea id="customAttrOptions" class="form-textarea" rows="3" placeholder="Option 1, Option 2, Option 3"></textarea>
          </div>
          <div class="form-group">
            <label class="form-label">
              <input type="checkbox" id="customAttrRequired">
              <span data-i18n="attrRequired"></span>
            </label>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" id="customAttrCancel" data-i18n="cancel"></button>
          <button type="submit" class="btn btn-primary" data-i18n="save"></button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/core/storage.js"></script>
  <script src="js/utils/helpers.js"></script>
  <script src="js/utils/backup.js"></script>
  <script src="js/utils/snapshot.js"></script>
  <script src="js/utils/page-transitions.js"></script>
  <script src="js/core/i18n.js"></script>
  <script src="js/core/theme.js"></script>
  <script src="js/core/auth.js"></script>
  <script src="js/modules/product-types.js"></script>
  <script src="data/seed.js"></script>
  <script src="js/modules/inventory.js"></script>
  <script>
    if (!Auth.requireAuth()) throw new Error('Not authenticated');

    Theme.init();
    I18n.init();
    Snapshot.initAutoSnapshot();
    AutoBackup.checkAndRun();
    PageTransitions.init();

    const session = Auth.getSession();
    document.getElementById('userName').textContent = session.username;
    document.getElementById('userRole').textContent = session.role;
    document.getElementById('userAvatar').textContent = session.username.charAt(0).toUpperCase();

    if (Auth.isWorker()) {
      document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'none');
      const exportBtn = document.getElementById('exportBtn');
      if (exportBtn) exportBtn.style.display = 'none';
    }

    const themeBtn = document.getElementById('themeToggle');
    themeBtn.textContent = Theme.getTheme() === 'dark' ? '☀️' : '🌙';
    themeBtn.addEventListener('click', () => {
      SmoothTheme.toggle();
      themeBtn.textContent = Theme.getTheme() === 'dark' ? '☀️' : '🌙';
    });

    const langBtn = document.getElementById('langToggle');
    langBtn.textContent = I18n.getLanguage() === 'en' ? 'عربي' : 'EN';
    langBtn.addEventListener('click', () => {
      I18n.toggle();
      langBtn.textContent = I18n.getLanguage() === 'en' ? 'عربي' : 'EN';
    });

    document.getElementById('logoutBtn').addEventListener('click', () => {
      Auth.logout();
    });

    Inventory.init();
  </script>
</body>
</html>
