<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Al-Hasan & Al-Hussein Library — Employees</title>
  <script>(function(){try{var s=localStorage.getItem('library_settings');if(s){var t=JSON.parse(s).theme;if(t==='dark')document.documentElement.classList.add('dark');}}catch(e){}})();</script>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/transitions.css">
</head>
<body>
  <div class="app-container">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">📚</div>
        <span class="sidebar-title" data-i18n="appName"></span>
      </div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-item">
          <span class="nav-icon">🏠</span>
          <span class="nav-label" data-i18n="dashboard"></span>
        </a>
        <a href="inventory.html" class="nav-item">
          <span class="nav-icon">📖</span>
          <span class="nav-label" data-i18n="inventory"></span>
        </a>
        <a href="cashier.html" class="nav-item">
          <span class="nav-icon">💰</span>
          <span class="nav-label" data-i18n="cashier"></span>
        </a>
        <a href="analytics.html" class="nav-item">
          <span class="nav-icon">📊</span>
          <span class="nav-label" data-i18n="analytics"></span>
        </a>
        <a href="employees.html" class="nav-item active">
          <span class="nav-icon">👥</span>
          <span class="nav-label" data-i18n="employees"></span>
        </a>
        <a href="debts.html" class="nav-item admin-only">
          <span class="nav-icon">💳</span>
          <span class="nav-label" data-i18n="debts"></span>
        </a>
        <a href="trash.html" class="nav-item">
          <span class="nav-icon">🗑️</span>
          <span class="nav-label" data-i18n="trash"></span>
        </a>
        <a href="settings.html" class="nav-item">
          <span class="nav-icon">⚙️</span>
          <span class="nav-label" data-i18n="settings"></span>
        </a>
      </nav>
      <div class="sidebar-footer">
        <button class="btn btn-secondary btn-block" id="logoutBtn">
          <span data-i18n="logout"></span>
        </button>
      </div>
    </aside>

    <main class="main-content">
      <header class="topbar">
        <div class="topbar-left">
          <h2 class="topbar-title" data-i18n="employees"></h2>
        </div>
        <div class="topbar-right">
          <button class="toggle-btn" id="themeToggle" title="Toggle theme">🌙</button>
          <button class="toggle-btn" id="langToggle" title="Toggle language">EN</button>
          <div class="user-badge">
            <div class="user-avatar" id="userAvatar"></div>
            <div class="user-info">
              <span class="user-name" id="userName"></span>
              <span class="user-role" id="userRole"></span>
            </div>
          </div>
        </div>
      </header>

      <div class="page-content">
        <div class="page-header">
          <div class="page-header-left">
            <h3 data-i18n="employeeManagement"></h3>
          </div>
          <div class="page-header-actions">
            <button class="btn btn-primary" id="addEmployeeBtn">
              <span>+</span>
              <span data-i18n="addEmployee"></span>
            </button>
          </div>
        </div>

        <div class="table-container">
          <table class="table">
            <thead>
              <tr>
                <th data-i18n="username"></th>
                <th data-i18n="role"></th>
                <th>Created Date</th>
                <th data-i18n="actions"></th>
              </tr>
            </thead>
            <tbody id="employeesBody"></tbody>
          </table>
        </div>
        <div class="empty-state" id="emptyState" style="display:none;">
          <div class="empty-state-icon">👥</div>
          <div class="empty-state-text" data-i18n="noEmployees"></div>
        </div>
      </div>
    </main>
  </div>

  <div class="modal-overlay" id="employeeModal">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title" id="modalTitle" data-i18n="addEmployee"></h3>
        <button class="modal-close" id="modalClose">&times;</button>
      </div>
      <form id="employeeForm">
        <div class="modal-body">
          <input type="hidden" id="employeeId">
          <div class="form-group">
            <label class="form-label" data-i18n="username"></label>
            <input type="text" id="employeeUsername" class="form-input" required>
          </div>
          <div class="form-group">
            <label class="form-label" data-i18n="password"></label>
            <input type="password" id="employeePassword" class="form-input">
          </div>
          <div class="form-group">
            <label class="form-label" data-i18n="role"></label>
            <select id="employeeRole" class="form-select" required>
              <option value="worker" data-i18n="worker"></option>
              <option value="admin" data-i18n="admin"></option>
            </select>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" id="cancelBtn" data-i18n="cancel"></button>
          <button type="submit" class="btn btn-primary" data-i18n="save"></button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/core/storage.js"></script>
  <script src="js/utils/helpers.js"></script>
  <script src="js/ui/ui-kit.js"></script>
  <script src="js/utils/backup.js"></script>
  <script src="js/utils/snapshot.js"></script>
  <script src="js/utils/page-transitions.js"></script>
  <script src="js/core/i18n.js"></script>
  <script src="js/core/theme.js"></script>
  <script src="js/core/auth.js"></script>
  <script src="data/seed.js"></script>
  <script src="js/modules/employees.js"></script>
  <script>
    if (!Auth.requireAuth()) throw new Error('Not authenticated');
    if (!Auth.isAdmin()) { window.location.href = 'dashboard.html'; throw new Error('Admin only'); }

    Theme.init();
    I18n.init();
    Snapshot.initAutoSnapshot();
    AutoBackup.checkAndRun();
    PageTransitions.init();

    const session = Auth.getSession();
    document.getElementById('userName').textContent = session.username;
    document.getElementById('userRole').textContent = session.role;
    document.getElementById('userAvatar').textContent = session.username.charAt(0).toUpperCase();

    const themeBtn = document.getElementById('themeToggle');
    themeBtn.textContent = Theme.getTheme() === 'dark' ? '☀️' : '🌙';
    themeBtn.addEventListener('click', () => {
      SmoothTheme.toggle();
      themeBtn.textContent = Theme.getTheme() === 'dark' ? '☀️' : '🌙';
    });

    const langBtn = document.getElementById('langToggle');
    langBtn.textContent = I18n.getLanguage() === 'en' ? 'عربي' : 'EN';
    langBtn.addEventListener('click', () => {
      I18n.toggle();
      langBtn.textContent = I18n.getLanguage() === 'en' ? 'عربي' : 'EN';
    });

    document.getElementById('logoutBtn').addEventListener('click', () => {
      Auth.logout();
    });

    Employees.init();
  </script>
</body>
</html>
